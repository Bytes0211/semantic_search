# ── Semantic Search — Application Configuration ──────────────────────────
#
# This file is the primary configuration entry point.
# Precedence: environment variable > this YAML > built-in defaults.
#
# Env override mapping:
#   TIER               → tier (ignored when tier_locked: true)
#   EMBEDDING_BACKEND  → embedding.backend
#   EMBEDDING_MODEL    → embedding.model
#   EMBEDDING_DIMENSION→ embedding.dimension
#   HOST / PORT        → server.host / server.port
#   LOG_LEVEL          → server.log_level
#   CORS_ORIGINS       → server.cors_origins
#   SEARCH_TOP_K       → server.search_top_k
#   ANALYTICS_ENABLED  → (backward compat: "true" → tier: premium)
#   PREPROCESSING_ENABLED   → preprocessing.enabled
#   PREPROCESSING_CLEAN     → preprocessing.clean
#   PREPROCESSING_CHUNK     → preprocessing.chunk
#   PREPROCESSING_CHUNK_SIZE→ preprocessing.chunk_size
#   PREPROCESSING_OVERLAP   → preprocessing.overlap
# ─────────────────────────────────────────────────────────────────────────

# Client subscription tier — determines which UI features are enabled.
#   basic    → search only
#   standard → search + drill-down detail + metadata filters
#   premium  → standard + analytics sidebar
tier: premium

# Lock the tier so the TIER environment variable cannot override it.
# Set to true before deploying to clients to prevent tier escalation.
tier_locked: false

# Embedding provider settings.
embedding:
  backend: spot
  model: sentence-transformers/all-MiniLM-L6-v2
  # dimension is auto-resolved from model presets; uncomment to override:
  # dimension: 384

# Server / runtime settings.
server:
  host: "0.0.0.0"
  port: 8000
  log_level: info
  cors_origins: "*"
  search_top_k: 10

# Custom model presets — register models not in the built-in preset list, or
# override a built-in entry's dimension/backend.  Each entry must include
# 'dimension'.  'backend' defaults to 'spot'; 'description' is optional.
# Built-in presets (always available without this block):
#   amazon.titan-embed-text-v1              bedrock    1536
#   amazon.titan-embed-text-v2              bedrock    1024
#   sentence-transformers/all-MiniLM-L6-v2  spot        384
#   sentence-transformers/all-mpnet-base-v2 spot        768
#
# models:
#   cohere.embed-english-v3:
#     dimension: 1024
#     backend: bedrock
#     description: "Cohere Embed English v3"
#   my-fine-tuned-model:
#     dimension: 768
#     backend: sagemaker
#     description: "Internal fine-tuned embedding model"

# Text preprocessing applied between ingestion and embedding.
# Cleaning normalises whitespace, strips HTML, and applies Unicode NFKC.
# Chunking splits long records at word boundaries (disabled by default —
# enable only after reviewing the cost impact on your embedding provider).
preprocessing:
  enabled: true
  clean: true
  chunk: false
  chunk_size: 512
  overlap: 64

# Access control — role-based post-filter on search results.
# When disabled (the default), the filter is a complete no-op with zero
# overhead.  Enable for deployments that require per-record visibility
# gating.  Records without the roles_field in metadata are treated as
# open access (visible to everyone).
#
# Env override mapping:
#   ACCESS_CONTROL_ENABLED              → access_control.enabled
#   ACCESS_CONTROL_ROLES_FIELD          → access_control.roles_field
#   ACCESS_CONTROL_OVERFETCH_MULTIPLIER → access_control.overfetch_multiplier
# S3 presigned URL generation for document links (Phase C).
# When enabled, s3:// doc_link values are replaced with time-limited
# presigned GetObject URLs at query time.  Other schemes (https://,
# server-relative paths) are passed through unchanged.
#
# Env override mapping:
#   PRESIGN_ENABLED        → presign.enabled
#   PRESIGN_TTL_SECONDS    → presign.ttl_seconds
#   PRESIGN_S3_REGION      → presign.s3_region
#   PRESIGN_DOC_LINK_FIELD → presign.doc_link_field
#
# presign:
#   enabled: true
#   ttl_seconds: 900
#   s3_region: us-east-1
#   doc_link_field: doc_link

access_control:
  enabled: false
  roles_field: allowed_roles
  overfetch_multiplier: 3
  # JWT identity integration (Phase B) — when jwt.jwks_url is set and
  # access_control.enabled is true, the JWT middleware is activated.
  # Caller roles are derived from the token instead of request.roles.
  #
  # Env override mapping:
  #   JWT_JWKS_URL     → access_control.jwt.jwks_url
  #   JWT_ISSUER       → access_control.jwt.issuer
  #   JWT_AUDIENCE     → access_control.jwt.audience
  #   JWT_ROLES_CLAIM  → access_control.jwt.roles_claim
  #
  # jwt:
  #   jwks_url: https://cognito-idp.<region>.amazonaws.com/<pool-id>/.well-known/jwks.json
  #   issuer: https://cognito-idp.<region>.amazonaws.com/<pool-id>
  #   audience: <app-client-id>
  #   roles_claim: cognito:groups
