# ── Example: AWS Bedrock Embedding ────────────────────────────────────────
# Uses Titan embed-text-v1 via AWS Bedrock.
# Requires valid AWS credentials and Bedrock model access.
# Copy to config/app.yaml to activate.

tier: standard

embedding:
  backend: bedrock
  model: amazon.titan-embed-text-v1
  # dimension auto-resolved to 1536 from model presets
  config:
    region: us-east-1

server:
  host: "0.0.0.0"
  port: 8000
  log_level: info
  cors_origins: "*"
  search_top_k: 10
