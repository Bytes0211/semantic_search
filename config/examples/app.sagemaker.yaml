# ── Example: AWS SageMaker Embedding ──────────────────────────────────────
# Uses a custom SageMaker endpoint for embeddings.
# Requires valid AWS credentials and an active SageMaker endpoint.
# Copy to config/app.yaml to activate.

tier: standard

embedding:
  backend: sagemaker
  model: custom-sagemaker-model
  dimension: 768
  config:
    endpoint_name: my-embedding-endpoint
    region: us-east-1

server:
  host: "0.0.0.0"
  port: 8000
  log_level: info
  cors_origins: "*"
  search_top_k: 10
